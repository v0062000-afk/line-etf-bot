services:
  - type: web
    name: line-etf-bot
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: LINE_CHANNEL_SECRET
        sync: false
      - key: LINE_CHANNEL_ACCESS_TOKEN
        sync: false
      - key: ADMIN_USER_IDS
        sync: false
      - key: DEFAULT_TRIAL_DAYS
        value: 7
      - key: DAILY_PUSH_HOUR
        value: 8
      - key: DAILY_PUSH_MINUTE
        value: 0
      - key: DB_PATH
        value: /opt/render/project/src/bot.db
      - key: BASE_WATCHLIST
        value: 0056
